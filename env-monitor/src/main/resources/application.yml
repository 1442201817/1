server:
  port: 8888

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/data?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=UTF-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root              # 请修改为你的 MySQL 用户名
    password: your_password     # 请修改为你的 MySQL 密码
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false

# 和风天气 API 配置
# 获取 API Key: https://dev.qweather.com/
qweather:
  api:
    key: your_qweather_api_key  # 请替换为你的和风天气 API Key
    host: your_api_host #请替换为你的和风天气API Host

# DeepSeek AI API 配置
# 获取 API Key: https://platform.deepseek.com/
ai:
  api:
    url: https://api.deepseek.com/chat/completions
    key: sk-your_deepseek_api_key  # 请替换为你的 DeepSeek API Key
    model: deepseek-v4-flash
